interface:
  display_name: "Video2Note"
  short_description: "Turn a Bilibili, YouTube, TikTok, or Douyin video into a structured LaTeX/PDF note set."
  default_prompt: "Use this skill to turn a Bilibili, YouTube, TikTok, or Douyin lecture, tutorial, replay, or analytical video into a high-quality Chinese LaTeX note with clear pedagogical motivation and logical continuity, direct visual inspection of extracted figures rather than OCR-only judgment, strong frame-to-text alignment, timestamped transcription via faster-whisper large-v3, vector-quality generated charts when needed, the original video cover on the front page when available, and a final synthesis section."
